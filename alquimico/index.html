<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquímico</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN para un estilo moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts para una tipografía limpia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&amp;family=Fira+Code:wght=400;500&amp;display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .code-font {
            font-family: 'Fira Code', monospace;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
    <script src="renderer.js" defer></script>
</head>

<body
    class="h-full bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-200 overflow-hidden flex flex-col">

    <!-- Encabezado principal (Header) -->
    <header
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between z-10 shrink-0 shadow-sm">
        <div class="flex items-center space-x-3">
            <!-- Botón de menú lateral para móviles -->
            <button onclick="toggleSidebar('left')"
                class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 md:hidden focus:outline-none">
                <svg class="w-6 h-6 text-slate-600 dark:text-slate-300" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div class="flex items-center space-x-2">
                <div class="bg-violet-600 text-white p-2 rounded-lg shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Alquímico</h1>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Bloc de notas con formato Zcodex</p>
                </div>
            </div>
        </div>

        <div class="flex items-center space-x-2">
            <!-- Botón para alternar tema claro / oscuro -->
            <button onclick="toggleTheme()"
                class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition"
                title="Cambiar tema">
                <svg id="theme-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
                <svg id="theme-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>

            <!-- Botón para la barra lateral derecha de ayuda en pantallas móviles -->
            <button onclick="toggleSidebar('right')"
                class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition lg:hidden"
                title="Ayuda de Alquímico">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.663 17h4.673M12 3v1m6.364 .364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Área de trabajo principal -->
    <div class="flex flex-1 overflow-hidden relative">

        <!-- BARRA LATERAL IZQUIERDA: Lista de Notas -->
        <aside id="sidebar-left"
            class="absolute inset-y-0 left-0 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-20 transition-transform duration-300 transform -translate-x-full md:translate-x-0 md:relative md:flex shrink-0">
            <!-- Botón de nuevo cuaderno -->
            <div class="px-4 border-b border-slate-100 dark:border-slate-800 flex flex-col justify-center h-[73px] shrink-0">
                <button id="btn-add-notebook"
                    class="w-full flex items-center justify-center space-x-2 bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white font-semibold py-2.5 px-4 rounded-xl shadow-md shadow-violet-200 dark:shadow-none transition duration-150">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    <span>Nuevo Cuaderno</span>
                </button>
            </div>

            <!-- Contenedor del arbol de notas -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="tree-view">
                <!-- Árbol generado por JS -->
            </div>

            <!-- Indicador de guardado -->
            <div
                class="p-3 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between text-xs text-slate-400">
                <span>Alquímico v1.0.0</span>
                <span id="save-status" class="flex items-center space-x-1 text-emerald-500">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                    <span>Guardado</span>
                </span>
            </div>
        </aside>

        <!-- COLUMNA CENTRAL: Editor y Vista Previa -->
        <main class="flex-1 flex flex-col overflow-hidden bg-white dark:bg-slate-900 relative">

            <!-- Barra superior del editor con título y el botón único de modo -->
            <div
                class="border-b border-slate-200 dark:border-slate-800 px-6 h-[73px] flex items-center justify-between shrink-0 bg-slate-50/50 dark:bg-slate-900/30">
                <div class="flex items-center w-2/3 group">
                    <div id="note-title"
                        class="bg-transparent text-xl font-bold text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none border-b border-transparent pb-0.5 transition truncate max-w-full">
                        Selecciona una nota</div>
                    <button id="btn-rename-note" class="ml-2 p-1.5 rounded-lg text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-violet-600 transition hidden group-hover:block" title="Renombrar Nota">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                    </button>
                </div>

                <!-- BOTÓN ÚNICO DE ALTERNANCIA (EDICIÓN / LECTURA) -->
                <button id="btn-toggle-mode"
                    class="flex items-center space-x-2 bg-violet-50 dark:bg-violet-950/40 text-violet-600 dark:text-violet-400 hover:bg-violet-100 dark:hover:bg-violet-950/80 active:bg-violet-200 px-4 py-2 rounded-xl text-sm font-semibold transition border border-violet-200/50 dark:border-violet-900/50 shadow-sm hidden">
                    <span id="toggle-icon">
                        <!-- Icono de lectura (predeterminado ya que iniciamos en lectura) -->
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </span>
                    <span id="toggle-text">Modo Lectura</span>
                </button>
            </div>

            <!-- Contenido dinámico -->
            <div class="flex-1 relative overflow-hidden flex flex-col">

                <div id="empty-state"
                    class="absolute inset-0 flex items-center justify-center p-8 text-center bg-slate-50/20 dark:bg-slate-900/10 z-10">
                    <p class="text-slate-400 dark:text-slate-500 text-lg">Crea o selecciona una nota para comenzar</p>
                </div>

                <!-- VISTA EDICIÓN -->
                <div id="editor-container" class="absolute inset-0 p-6 flex flex-col hidden">
                    <textarea id="markdown-input" placeholder="Comienza a escribir en formato Zcodex..."
                        class="w-full flex-1 bg-transparent resize-none text-slate-700 dark:text-slate-300 placeholder-slate-400/80 focus:outline-none font-mono text-sm leading-relaxed overflow-y-auto"></textarea>
                </div>

                <!-- VISTA LECTURA (RENDERIZADO) -->
                <div id="preview-container"
                    class="absolute inset-0 p-8 overflow-y-auto hidden bg-slate-50/20 dark:bg-slate-900/10">
                    <div id="html-output" class="max-w-4xl mx-auto prose dark:prose-invert prose-slate">
                        <!-- El texto en Zcodex renderizado aparecerá aquí -->
                    </div>
                </div>

            </div>
        </main>

        <!-- BARRA LATERAL DERECHA: Cheat Sheet de Zcodex en Español -->
        <aside id="sidebar-right"
            class="absolute inset-y-0 right-0 w-80 bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 flex flex-col z-20 transition-transform duration-300 transform translate-x-full lg:translate-x-0 lg:relative lg:flex shrink-0">
            <div
                class="px-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50 h-[73px] shrink-0">
                <div class="flex items-center space-x-2 text-violet-600 dark:text-violet-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <h2 class="font-bold">Guía Zcodex</h2>
                </div>
                <button onclick="toggleSidebar('right')"
                    class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 lg:hidden text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Lista interactiva de formatos -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3 text-xs">
                <p class="text-slate-500 dark:text-slate-400 mb-2">Haz clic sobre un elemento para insertarlo en el
                    editor:</p>
                <button onclick="insertTemplate('--h1 Título Principal')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Encabezado 1</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--h1 Texto</span>
                </button>
                <button onclick="insertTemplate('--h2 Título Secundario')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Encabezado 2</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--h2 Texto</span>
                </button>
                <button onclick="insertTemplate('--h3 Subtítulo')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Encabezado 3</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--h3 Texto</span>
                </button>
                <button onclick="insertTemplate('--strong Texto en negrita strong--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Negrita</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--strong Texto strong--</span>
                </button>
                <button onclick="insertTemplate('--em Texto en cursiva em--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Cursiva</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--em Texto em--</span>
                </button>
                <button onclick="insertTemplate('--code console.log(&apos;Hola Zcodex&apos;) code--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Código en línea</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--code Texto code--</span>
                </button>
                <button onclick="insertTemplate('--precode\\n// Bloque de código\\nlet variables = 100;\\nprecode--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Bloque de código</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--precode Código precode--</span>
                </button>
                <button onclick="insertTemplate('--a -https://google.com--Buscador Google- a--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Enlace</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--a -URL--Texto- a--</span>
                </button>
                <button
                    onclick="insertTemplate('--img -https://images.unsplash.com/photo-1579546929518-9e396f3cc809--Imagen colorida- img--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Imagen</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--img -URL--Texto- img--</span>
                </button>
                <button onclick="insertTemplate('--blq Una cita reflexiva e importante. blq--')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Cita (Blockquote)</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--blq Texto blq--</span>
                </button>
                <button onclick="insertTemplate('--ulli Primer elemento\\n--ulli Segundo elemento')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Lista desordenada</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--ulli Elemento</span>
                </button>
                <button onclick="insertTemplate('--olli Primer elemento\\n--olli Segundo elemento')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Lista ordenada</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--olli Elemento</span>
                </button>
                <button onclick="insertTemplate('\\n--hr\\n')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Línea horizontal</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--hr</span>
                </button>
                <button onclick="insertTemplate('--br')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Salto de línea</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">--br</span>
                </button>
                <button onclick="insertTemplate('\\n// Titulo1 // Titulo2 // Titulo3 //\\n// &lt;- // &lt;-&gt; // -&gt; //\\n// texto // texto // texto //')"
                    class="w-full text-left p-2.5 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-violet-300 dark:hover:border-violet-800 bg-slate-50 dark:bg-slate-900/30 transition flex flex-col">
                    <span class="font-semibold text-slate-700 dark:text-slate-300">Tabla</span>
                    <span class="code-font text-violet-500 dark:text-violet-400 mt-1">// Titulo1 // Titulo2 // Titulo3 //<br>// &lt;- // &lt;-&gt; // -&gt; //</span>
                </button>

            </div>
        </aside>

    </div>

    <!-- Modals for creating items (Tailwind styled) -->
    <div id="modal"
        class="fixed inset-0 bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div
            class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-xl w-80 max-w-full border border-slate-200 dark:border-slate-800">
            <h3 id="modal-title" class="text-lg font-bold text-slate-900 dark:text-white mb-4">Título</h3>
            <input type="text" id="modal-input" placeholder="Nombre..."
                class="w-full p-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-800 dark:text-slate-200 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 mb-5">
            <div class="flex items-center justify-end space-x-3">
                <button id="modal-cancel"
                    class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition">Cancelar</button>
                <button id="modal-confirm"
                    class="px-4 py-2 text-sm font-medium bg-violet-600 text-white hover:bg-violet-700 active:bg-violet-800 rounded-lg transition">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Mensajes de notificación estilo Toast -->
    <div id="notification"
        class="fixed bottom-4 right-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-2.5 rounded-lg text-sm shadow-xl flex items-center space-x-2 transform translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
        <span id="notification-msg">Mensaje...</span>
    </div>
</body>

</html>
